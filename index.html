<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prancha Mágica</title>
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#42a5f5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>

@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background: radial-gradient(circle at top left,#81d4fa,#4fc3f7,#0288d1);
    font-family:'Fredoka', sans-serif;
}

/* =========================
ESTRUTURA PRINCIPAL
========================= */

.prancha{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    overflow:auto;
    padding:30px 20px;
}

/* =========================
CONTROLE DE VOZ
========================= */

.controle-voz{
    display:flex;
    gap:15px;
    margin-bottom:35px;
    flex-wrap:wrap;
    justify-content:center;
}

.voz-btn{
    border:none;
    padding:14px 22px;
    border-radius:18px;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

.voz-btn:hover{
    transform:scale(1.05);
}

.feminina{
    background:#f48fb1;
    color:white;
}

.masculina{
    background:#64b5f6;
    color:white;
}

/* =========================
GRID DE CARDS
========================= */

.grid{
    width:100%;
    max-width:1000px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
}

.card{
    background:rgba(255,255,255,0.92);
    border-bottom:10px solid #039be5;
    color:#01579b;
    border-radius:35px;
    padding:25px;
    text-align:center;
    cursor:pointer;
    transition:0.2s;
    user-select:none;
}

.card:hover{
    transform:translateY(-8px) scale(1.04);
}

.emoji{
    margin-bottom:15px;
    font-size:85px;
}

.texto{
    font-weight:bold;
    font-size:28px;
}

@media(max-width:850px){
    .grid{
        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:600px){
    .grid{
        grid-template-columns:1fr;
    }
    .emoji{
        font-size:70px;
    }
    .texto{
        font-size:24px;
    }
}

</style>
</head>
<body>

<main class="prancha">

    <div class="controle-voz">
        <button onclick="selecionarVoz('feminina')" class="voz-btn feminina">
        👩 Voz Feminina
        </button>

        <button onclick="selecionarVoz('masculina')" class="voz-btn masculina">
        👨 Voz Masculina
        </button>
    </div>

    <div class="grid">

        <div class="card" onclick="falar('Quero água')">
            <div class="emoji">💧</div>
            <div class="texto">Água</div>
        </div>

        <div class="card" onclick="falar('Estou com fome')">
            <div class="emoji">🍎</div>
            <div class="texto">Fome</div>
        </div>

        <div class="card" onclick="falar('Quero ir ao banheiro')">
            <div class="emoji">🚽</div>
            <div class="texto">Banheiro</div>
        </div>

        <div class="card" onclick="falar('Quero brincar')">
            <div class="emoji">🧸</div>
            <div class="texto">Brincar</div>
        </div>

        <div class="card" onclick="falar('Estou com sono')">
            <div class="emoji">😴</div>
            <div class="texto">Sono</div>
        </div>

        <div class="card" onclick="falar('Estou sentindo dor')">
            <div class="emoji">🤕</div>
            <div class="texto">Dor</div>
        </div>

    </div>

</main>

<script>
let vozesDisponiveis = [];
let vozSelecionada = null;

/* =========================
CARREGAR VOZES
========================= */
function carregarVozes() {
    vozesDisponiveis = speechSynthesis.getVoices().filter(v => v.lang.includes('pt'));
}

speechSynthesis.onvoiceschanged = carregarVozes;
carregarVozes();

/* =========================
SELEÇÃO DE VOZ INTELIGENTE
========================= */
function selecionarVoz(tipo) {
    if (vozesDisponiveis.length === 0) {
        carregarVozes(); 
    }

    if (vozesDisponiveis.length === 0) {
        alert("Carregando as vozes do sistema... Tente novamente em 1 segundo.");
        return;
    }

    if (tipo === 'feminina') {
        vozSelecionada = vozesDisponiveis.find(v => 
            v.name.toLowerCase().match(/(female|maria|luciana|mulher|feminina|f\b)/)
        ) || vozesDisponiveis[0]; 
    } else {
        vozSelecionada = vozesDisponiveis.find(v => 
            v.name.toLowerCase().match(/(male|ricardo|daniel|homem|masculina|m\b)/)
        ) || vozesDisponiveis[vozesDisponiveis.length - 1]; 
    }

    alert("Voz configurada: " + vozSelecionada.name);
}

/* =========================
SISTEMA DE FALA
========================= */
function falar(texto) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); 

        const fala = new SpeechSynthesisUtterance(texto);
        fala.lang = 'pt-BR';
        fala.rate = 0.9; 
        fala.pitch = 1;

        if (vozSelecionada) {
            fala.voice = vozSelecionada;
        } else if (vozesDisponiveis.length > 0) {
            fala.voice = vozesDisponiveis[0]; 
        }

        speechSynthesis.speak(fala);
    } else {
        alert("Seu navegador não suporta leitura de voz.");
    }
}

/* =========================
REGISTRO DO SERVICE WORKER (OFFLINE)
========================= */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js')
      .then((registration) => {
        console.log('Service Worker registrado com sucesso:', registration.scope);
      })
      .catch((error) => {
        console.log('Falha ao registrar o Service Worker:', error);
      });
  });
}
</script>

</body>
</html>
