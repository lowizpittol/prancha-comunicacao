<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pranchas Interativas - Creche</title>
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#42a5f5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>

@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Baloo+2:wght@500;700&family=Nunito:wght@700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
}

/* =========================
MENU
========================= */

.menu{
    width:100%;
    height:100vh;
    background:linear-gradient(135deg,#ffecd2,#fcb69f);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.menu h1{
    font-size:52px;
    font-family:'Fredoka', sans-serif;
    color:#5d4037;
    margin-bottom:20px;
}

.menu p{
    font-size:22px;
    margin-bottom:40px;
    color:#6d4c41;
}

.botoes-menu{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    justify-content:center;
}

.botao-versao{
    border:none;
    padding:22px 40px;
    border-radius:30px;
    font-size:24px;
    cursor:pointer;
    transition:0.2s;
    font-weight:bold;
    color:white;
}

.botao-versao:hover{
    transform:scale(1.08);
}

.v1-btn{
    background:#42a5f5;
}

.v2-btn{
    background:#ab47bc;
}

.v3-btn{
    background:#43a047;
}

/* =========================
TELAS
========================= */

.tela{
    width:100%;
    height:100vh;
    display:none;
    flex-direction:column;
    align-items:center;
    overflow:auto;
    padding:20px;
}

.ativo{
    display:flex;
}

.voltar{
    margin-top:10px;
    margin-bottom:15px;
    border:none;
    padding:12px 24px;
    border-radius:20px;
    cursor:pointer;
    font-size:18px;
    font-weight:bold;
}

/* =========================
CONTROLE DE VOZ
========================= */

.controle-voz{
    display:flex;
    gap:15px;
    margin-bottom:25px;
    flex-wrap:wrap;
    justify-content:center;
}

.voz-btn{
    border:none;
    padding:14px 22px;
    border-radius:18px;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

.voz-btn:hover{
    transform:scale(1.05);
}

.feminina{
    background:#f48fb1;
    color:white;
}

.masculina{
    background:#64b5f6;
    color:white;
}

/* =========================
GRID
========================= */

.grid{
    width:100%;
    max-width:1000px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
}

.card{
    border-radius:35px;
    padding:25px;
    text-align:center;
    cursor:pointer;
    transition:0.2s;
    user-select:none;
}

.card:hover{
    transform:translateY(-8px) scale(1.04);
}

.emoji{
    margin-bottom:15px;
}

.texto{
    font-weight:bold;
}

@media(max-width:850px){

    .grid{
        grid-template-columns:repeat(2,1fr);
    }

}

@media(max-width:600px){

    .grid{
        grid-template-columns:1fr;
    }

}

/* =====================================
VERSÃO 1 — OCEANO
===================================== */

#versao1{
    background:
    radial-gradient(circle at top left,#81d4fa,#4fc3f7,#0288d1);
    font-family:'Fredoka', sans-serif;
}

#versao1 h2{
    font-size:48px;
    color:white;
    margin-bottom:20px;
}

#versao1 .voltar{
    background:white;
    color:#0288d1;
}

.v1{
    background:rgba(255,255,255,0.92);
    border-bottom:10px solid #039be5;
    color:#01579b;
}

.v1 .emoji{
    font-size:85px;
}

.v1 .texto{
    font-size:28px;
}

/* =====================================
VERSÃO 2 — GALÁXIA
===================================== */

#versao2{
    background:
    linear-gradient(to bottom,#1a237e,#512da8,#7b1fa2);
    font-family:'Baloo 2', cursive;
}

#versao2 h2{
    font-size:56px;
    color:#fff176;
    margin-bottom:20px;
}

#versao2 .voltar{
    background:#fff176;
    color:#4a148c;
}

.v2{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(8px);
    border:3px solid rgba(255,255,255,0.4);
    color:white;
}

.v2 .emoji{
    font-size:92px;
}

.v2 .texto{
    font-size:32px;
}

/* =====================================
VERSÃO 3 — FLORESTA
===================================== */

#versao3{
    background:
    linear-gradient(135deg,#c8e6c9,#81c784,#388e3c);
    font-family:'Nunito', sans-serif;
}

#versao3 h2{
    font-size:50px;
    color:#1b5e20;
    margin-bottom:20px;
}

#versao3 .voltar{
    background:#1b5e20;
    color:white;
}

.v3{
    background:#fff8e1;
    border-bottom:10px solid #ffca28;
    color:#5d4037;
    box-shadow:0 10px 20px rgba(0,0,0,0.12);
}

.v3 .emoji{
    font-size:78px;
}

.v3 .texto{
    font-size:30px;
}

</style>
</head>
<body>

<div class="menu" id="menu">

<script>
let vozesDisponiveis = [];
let vozSelecionada = null;

/* =========================
CARREGAR VOZES (Versão Mobile Friendly)
========================= */
function carregarVozes() {
    // Pega todas as vozes e filtra apenas as em português
    vozesDisponiveis = speechSynthesis.getVoices().filter(v => v.lang.includes('pt'));
}

// O navegador avisa quando as vozes estão prontas
speechSynthesis.onvoiceschanged = carregarVozes;
// Tenta carregar imediatamente também (ajuda em alguns navegadores)
carregarVozes();

/* =========================
SELEÇÃO DE VOZ INTELIGENTE
========================= */
function selecionarVoz(tipo) {
    if (vozesDisponiveis.length === 0) {
        // Tenta carregar de novo caso o celular tenha demorado
        carregarVozes(); 
    }

    if (vozesDisponiveis.length === 0) {
        alert("Ainda carregando as vozes do sistema... Tente novamente em 1 segundo.");
        return;
    }

    if (tipo === 'feminina') {
        // Tenta achar nomes femininos conhecidos. Se não achar, pega a PRIMEIRA voz em português disponível (que geralmente é a padrão feminina do celular)
        vozSelecionada = vozesDisponiveis.find(v => 
            v.name.toLowerCase().match(/(female|maria|luciana|mulher|feminina|f\b)/)
        ) || vozesDisponiveis[0]; 
    } else {
        // Tenta achar nomes masculinos. Se não achar, pega a ÚLTIMA voz da lista (muitos celulares colocam a voz masculina como secundária)
        vozSelecionada = vozesDisponiveis.find(v => 
            v.name.toLowerCase().match(/(male|ricardo|daniel|homem|masculina|m\b)/)
        ) || vozesDisponiveis[vozesDisponiveis.length - 1]; 
    }

    // Mostra o nome real da voz que o celular escolheu, para você saber o que está rodando por baixo dos panos
    alert("Voz configurada: " + vozSelecionada.name);
}

/* =========================
FALAR
========================= */
function falar(texto) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); // Corta a fala anterior se a criança clicar 2x rápido

        const fala = new SpeechSynthesisUtterance(texto);
        fala.lang = 'pt-BR';
        fala.rate = 0.9; // Um pouco mais lento para crianças entenderem melhor
        fala.pitch = 1;

        if (vozSelecionada) {
            fala.voice = vozSelecionada;
        } else if (vozesDisponiveis.length > 0) {
            // Se a pessoa não clicou em nenhum botão de voz, usa a padrão
            fala.voice = vozesDisponiveis[0]; 
        }

        speechSynthesis.speak(fala);
    } else {
        alert("Seu navegador não suporta leitura de voz.");
    }
}

/* =========================
ABRIR TELAS E VOLTAR
========================= */
function abrirVersao(id){
    document.getElementById('menu').style.display='none';
    document.querySelectorAll('.tela').forEach(tela=>{
        tela.classList.remove('ativo');
    });
    document.getElementById(id).classList.add('ativo');
}

function voltarMenu(){
    document.querySelectorAll('.tela').forEach(tela=>{
        tela.classList.remove('ativo');
    });
    document.getElementById('menu').style.display='flex';
}

// Registra o Service Worker para funcionar offline
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js')
      .then((registration) => {
        console.log('Service Worker registrado com sucesso:', registration.scope);
      })
      .catch((error) => {
        console.log('Falha ao registrar o Service Worker:', error);
      });
  });
}
</script>
