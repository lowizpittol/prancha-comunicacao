<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pranchas Interativas - Creche</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Baloo+2:wght@500;700&family=Nunito:wght@700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
}

/* =========================
MENU
========================= */

.menu{
    width:100%;
    height:100vh;
    background:linear-gradient(135deg,#ffecd2,#fcb69f);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.menu h1{
    font-size:52px;
    font-family:'Fredoka', sans-serif;
    color:#5d4037;
    margin-bottom:20px;
}

.menu p{
    font-size:22px;
    margin-bottom:40px;
    color:#6d4c41;
}

.botoes-menu{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    justify-content:center;
}

.botao-versao{
    border:none;
    padding:22px 40px;
    border-radius:30px;
    font-size:24px;
    cursor:pointer;
    transition:0.2s;
    font-weight:bold;
    color:white;
}

.botao-versao:hover{
    transform:scale(1.08);
}

.v1-btn{
    background:#42a5f5;
}

.v2-btn{
    background:#ab47bc;
}

.v3-btn{
    background:#ff7043;
}

/* =========================
TELAS
========================= */

.tela{
    width:100%;
    height:100vh;
    display:none;
    flex-direction:column;
    align-items:center;
    overflow:auto;
    padding:20px;
}

.ativo{
    display:flex;
}

.voltar{
    margin-top:10px;
    margin-bottom:15px;
    border:none;
    padding:12px 24px;
    border-radius:20px;
    cursor:pointer;
    font-size:18px;
    font-weight:bold;
}

/* =========================
GRID
========================= */

.grid{
    width:100%;
    max-width:1000px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
}

.card{
    border-radius:35px;
    padding:25px;
    text-align:center;
    cursor:pointer;
    transition:0.2s;
    user-select:none;
}

.card:hover{
    transform:translateY(-8px) scale(1.04);
}

.emoji{
    margin-bottom:15px;
}

.texto{
    font-weight:bold;
}

@media(max-width:850px){

    .grid{
        grid-template-columns:repeat(2,1fr);
    }

}

@media(max-width:600px){

    .grid{
        grid-template-columns:1fr;
    }

}

/* =====================================
VERSÃO 1 — FUNDO OCEANO
===================================== */

#versao1{
    background:
    radial-gradient(circle at top left,#81d4fa,#4fc3f7,#0288d1);
    font-family:'Fredoka', sans-serif;
}

#versao1 h2{
    font-size:48px;
    color:white;
    margin-bottom:20px;
}

#versao1 .voltar{
    background:white;
    color:#0288d1;
}

.v1{
    background:rgba(255,255,255,0.92);
    border-bottom:10px solid #039be5;
    color:#01579b;
}

.v1 .emoji{
    font-size:85px;
}

.v1 .texto{
    font-size:28px;
}

/* =====================================
VERSÃO 2 — FUNDO ESPAÇO
===================================== */

#versao2{
    background:
    linear-gradient(to bottom,#1a237e,#512da8,#7b1fa2);
    font-family:'Baloo 2', cursive;
}

#versao2 h2{
    font-size:56px;
    color:#fff176;
    margin-bottom:20px;
}

#versao2 .voltar{
    background:#fff176;
    color:#4a148c;
}

.v2{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(8px);
    border:3px solid rgba(255,255,255,0.4);
    color:white;
}

.v2 .emoji{
    font-size:92px;
}

.v2 .texto{
    font-size:32px;
}

/* =====================================
VERSÃO 3 — FUNDO FLORESTA
===================================== */

#versao3{
    background:
    linear-gradient(135deg,#c8e6c9,#81c784,#388e3c);
    font-family:'Nunito', sans-serif;
}

#versao3 h2{
    font-size:50px;
    color:#1b5e20;
    margin-bottom:20px;
}

#versao3 .voltar{
    background:#1b5e20;
    color:white;
}

.v3{
    background:#fff8e1;
    border-bottom:10px solid #ffca28;
    color:#5d4037;
    box-shadow:0 10px 20px rgba(0,0,0,0.12);
}

.v3 .emoji{
    font-size:78px;
}

.v3 .texto{
    font-size:30px;
}

</style>
</head>

<body>

<!-- =========================
MENU INICIAL
========================= -->

<div class="menu" id="menu">

<h1>🌟 Pranchas da Creche</h1>

<p>Escolha uma versão para testar com as crianças</p>

<div class="botoes-menu">

<button class="botao-versao v1-btn" onclick="abrirVersao('versao1')">
🌊 Versão 1
</button>

<button class="botao-versao v2-btn" onclick="abrirVersao('versao2')">
🚀 Versão 2
</button>

<button class="botao-versao v3-btn" onclick="abrirVersao('versao3')">
🌳 Versão 3
</button>

</div>

</div>

<!-- =========================
VERSÃO 1
========================= -->

<section class="tela" id="versao1">

<button class="voltar" onclick="voltarMenu()">⬅ Voltar</button>

<h2>🌊 Mundo do Oceano</h2>

<div class="grid">

<div class="card v1" onclick="falar('Quero água')">
<div class="emoji">🐳</div>
<div class="texto">Água</div>
</div>

<div class="card v1" onclick="falar('Estou com fome')">
<div class="emoji">🐠</div>
<div class="texto">Fome</div>
</div>

<div class="card v1" onclick="falar('Quero ir ao banheiro')">
<div class="emoji">🪼</div>
<div class="texto">Banheiro</div>
</div>

<div class="card v1" onclick="falar('Quero brincar')">
<div class="emoji">🦀</div>
<div class="texto">Brincar</div>
</div>

<div class="card v1" onclick="falar('Estou com sono')">
<div class="emoji">🌙</div>
<div class="texto">Sono</div>
</div>

<div class="card v1" onclick="falar('Estou sentindo dor')">
<div class="emoji">🐙</div>
<div class="texto">Dor</div>
</div>

</div>

</section>

<!-- =========================
VERSÃO 2
========================= -->

<section class="tela" id="versao2">

<button class="voltar" onclick="voltarMenu()">⬅ Voltar</button>

<h2>🚀 Galáxia Divertida</h2>

<div class="grid">

<div class="card v2" onclick="falar('Quero água')">
<div class="emoji">🛸</div>
<div class="texto">Água</div>
</div>

<div class="card v2" onclick="falar('Estou com fome')">
<div class="emoji">👽</div>
<div class="texto">Fome</div>
</div>

<div class="card v2" onclick="falar('Quero ir ao banheiro')">
<div class="emoji">🌕</div>
<div class="texto">Banheiro</div>
</div>

<div class="card v2" onclick="falar('Quero brincar')">
<div class="emoji">⭐</div>
<div class="texto">Brincar</div>
</div>

<div class="card v2" onclick="falar('Estou com sono')">
<div class="emoji">☄️</div>
<div class="texto">Sono</div>
</div>

<div class="card v2" onclick="falar('Estou sentindo dor')">
<div class="emoji">🪐</div>
<div class="texto">Dor</div>
</div>

</div>

</section>

<!-- =========================
VERSÃO 3
========================= -->

<section class="tela" id="versao3">

<button class="voltar" onclick="voltarMenu()">⬅ Voltar</button>

<h2>🌳 Floresta Encantada</h2>

<div class="grid">

<div class="card v3" onclick="falar('Quero água')">
<div class="emoji">🐸</div>
<div class="texto">Água</div>
</div>

<div class="card v3" onclick="falar('Estou com fome')">
<div class="emoji">🍓</div>
<div class="texto">Fome</div>
</div>

<div class="card v3" onclick="falar('Quero ir ao banheiro')">
<div class="emoji">🌻</div>
<div class="texto">Banheiro</div>
</div>

<div class="card v3" onclick="falar('Quero brincar')">
<div class="emoji">🦋</div>
<div class="texto">Brincar</div>
</div>

<div class="card v3" onclick="falar('Estou com sono')">
<div class="emoji">🦉</div>
<div class="texto">Sono</div>
</div>

<div class="card v3" onclick="falar('Estou sentindo dor')">
<div class="emoji">🐻</div>
<div class="texto">Dor</div>
</div>

</div>

</section>

<script>

function abrirVersao(id){

    document.getElementById('menu').style.display='none';

    document.querySelectorAll('.tela').forEach(tela=>{
        tela.classList.remove('ativo');
    });

    document.getElementById(id).classList.add('ativo');

}

function voltarMenu(){

    document.querySelectorAll('.tela').forEach(tela=>{
        tela.classList.remove('ativo');
    });

    document.getElementById('menu').style.display='flex';

}

function falar(texto){

    if('speechSynthesis' in window){

        window.speechSynthesis.cancel();

        const fala = new SpeechSynthesisUtterance(texto);

        fala.lang='pt-BR';
        fala.rate=0.85;
        fala.pitch=1.1;

        window.speechSynthesis.speak(fala);

    }

}

</script>

</body>
</html>
